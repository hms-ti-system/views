<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site com Vídeo Loop</title>
    <style>
        /* Estilo para cobrir a tela toda, opcional */
        video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body>
    <!-- autoplay: inicia sozinho -->
    <!-- loop: repete infinitamente -->
    <!-- muted: sem som (necessário para autoplay) -->
    <!-- playsinline: necessário para autoplay no mobile -->
    <video autoplay loop muted playsinline>
        <source src="video.mp4" type="video/mp4">
        Seu navegador não suporta vídeos.
    </video>

    <h1>Olá Mundo</h1>
</body>
</html>

</body>
